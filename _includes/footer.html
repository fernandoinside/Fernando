<footer class="site-footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-info">
        <h3>{{ site.title }}</h3>
        <p>{{ site.description }}</p>
      </div>
      <div class="footer-links">
        <a href="{{ site.contact_email | prepend: 'mailto:' }}">Email: {{ site.contact_email }}</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
        {% if site.linkedin_username %}
        <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener">LinkedIn</a>
        {% endif %}
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Todos os direitos reservados.</p>
    </div>
  </div>
</footer>
